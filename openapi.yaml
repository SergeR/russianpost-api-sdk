          sender-name:
            type: string
            description: Наименование отправителя

    ReturnWithoutDirectResponse:
      type: array
      description: Результаты создания возвратных отправлений
      items:
        type: object
        required:
          - position
        properties:
          errors:
            type: array
            description: Ошибки
            items:
              type: object
              required:
                - code
                - description
              properties:
                code:
                  type: string
                  description: Код ошибки
                  enum:
                    - DIRECT_SHIPMENT_NOT_FOUND
                description:
                  type: string
                  description: Описание ошибки
          position:
            type: integer
            description: Индекс в исходном массиве
            minimum: 0
          return-barcode:
            type: string
            description: ШПИ возвратного отправления

    DeleteSeparateReturnErrorResponse:
      type: object
      description: Ответ при ошибке удаления возврата
      required:
        - code
        - description
      additionalProperties: false
      properties:
        code:
          type: string
          description: Код ошибки
          enum:
            - RETURN_SHIPMENT_NOT_FOUND
        description:
          type: string
          description: Описание ошибки

    ReturnsPostRequest:
      type: object
      description: Запрос на редактирование возвратного отправления
      properties:
        address-from:
          $ref: '#/components/schemas/Address'
        address-to:
          $ref: '#/components/schemas/Address'
        insr-value:
          type: integer
          description: Объявленная ценность (копейки)
          minimum: 0
        order-num:
          type: string
          description: Номер заказа
        postoffice-code:
          type: string
          description: Индекс ОПС
          pattern: '^[0-9]{6}$'
        recipient-name:
          type: string
          description: Наименование получателя
        sender-name:
          type: string
          description: Наименование отправителя

    ReturnsPostResponse:
      type: object
      description: Результат редактирования возвратного отправления
      properties:
        errors:
          type: array
          description: Ошибки
          items:
            type: object
            required:
              - code
              - description
            properties:
              code:
                type: string
                description: Код ошибки
                enum:
                  - DIRECT_SHIPMENT_NOT_FOUND
              description:
                type: string
                description: Описание ошибки

    CleanAddressRequest:
      type: array
      description: Адреса для нормализации
      minItems: 1
      items:
        type: object
        required:
          - id
          - original-address
        additionalProperties: false
        properties:
          id:
            type: string
            description: Идентификатор записи
          original-address:
            type: string
            description: Оригинальный адрес одной строкой

    CleanAddressResponse:
      type: array
      description: Нормализованные адреса
      items:
        type: object
        required:
          - address-type
          - id
          - index
          - original-address
          - place
          - quality-code
          - region
          - validation-code
        additionalProperties: false
        properties:
          address-type:
            type: string
            description: Тип адреса
            enum:
              - DEFAULT
            default: DEFAULT
          area:
            type: string
            description: Район
          building:
            type: string
            description: Строение
          corpus:
            type: string
            description: Корпус
          hotel:
            type: string
            description: Гостиница
          house:
            type: string
            description: Номер здания
          id:
            type: string
            description: Идентификатор записи
          index:
            type: string
            description: Почтовый индекс
            pattern: '^[0-9]{6}$'
          letter:
            type: string
            description: Литера
          location:
            type: string
            description: Микрорайон
          num-address-type:
            type: string
            description: Номер для а/я, войсковая часть
          original-address:
            type: string
            description: Оригинальный адрес одной строкой
          place:
            type: string
            description: Населённый пункт
          quality-code:
            type: string
            description: Код качества нормализации адреса
            enum:
              - GOOD
              - POSTAL_BOX
              - ON_DEMAND
              - UNDEF_05
              - UNDEF_04
              - NOT_USED_HOUSE
              - INCOMPLETE
              - ACT_INCOMPL
          region:
            type: string
            description: Область, регион
          room:
            type: string
            description: Номер помещения
          slash:
            type: string
            description: Дробь
          street:
            type: string
            description: Улица
          validation-code:
            type: string
            description: Код проверки нормализации
            enum:
              - CONFIRMED_MANUALLY
              - VALIDATED
              - OVERRIDDEN
              - NOT_VALIDATED_HAS_MATCHES
              - NOT_VALIDATED_NO_MATCHES
              - NOT_VALIDATED_UNPARSED_PART

    CleanPhysicalRequest:
      type: array
      description: Данные ФИО для нормализации
      items:
        type: object
        required:
          - id
          - original-fio
        additionalProperties: false
        properties:
          id:
            type: string
            description: Идентификатор записи
          original-fio:
            type: string
            description: Оригинальные ФИО одной строкой

    CleanPhysicalResponse:
      type: array
      description: Нормализованные ФИО
      items:
        type: object
        required:
          - id
          - original-fio
          - quality-code
          - valid
        additionalProperties: false
        properties:
          id:
            type: string
            description: Идентификатор записи
          middle-name:
            type: string
            description: Отчество
          name:
            type: string
            description: Имя
          original-fio:
            type: string
            description: Оригинальные ФИО одной строкой
          quality-code:
            type: string
            description: Код качества нормализации ФИО
            enum:
              - CONFIRMED_MANUALLY
              - CONFIRMED
              - NOT_CONFIRMED_AUTO
              - NOT_CONFIRMED_MANUALLY
          surname:
            type: string
            description: Фамилия
          valid:
            type: boolean
            description: Качество нормализации приемлемое

    CleanPhoneRequest:
      type: array
      description: Телефоны для нормализации
      minItems: 1
      items:
        type: object
        required:
          - id
          - original-phone
        additionalProperties: false
        properties:
          area:
            type: string
            description: Область/край
          id:
            type: string
            description: Идентификатор записи
          original-phone:
            type: string
            description: Оригинальный номер одной строкой
          place:
            type: string
            description: Город
          region:
            type: string
            description: Регион

    CleanPhoneResponse:
      type: array
      description: Нормализованные телефоны
      items:
        type: object
        required:
          - id
          - original-phone
          - phone-city-code
          - phone-country-code
          - phone-extension
          - phone-number
          - quality-code
        additionalProperties: false
        properties:
          id:
            type: string
            description: Идентификатор записи
          original-phone:
            type: string
            description: Оригинальный номер одной строкой
          phone-city-code:
            type: string
            description: Код города
          phone-country-code:
            type: string
            description: Код страны
          phone-extension:
            type: string
            description: Добавочный номер
          phone-number:
            type: string
            description: Номер телефона
          quality-code:
            type: string
            description: Код качества нормализации
            enum:
              - CONFIRMED_MANUALLY
              - CONFIRMED
              - NOT_CONFIRMED
              - UNKNOWN

    TariffRequest:
      type: object
      description: Запрос расчёта тарифа
      required:
        - entries-type
        - inventory
        - mail-category
        - mail-type
        - mass
        - with-order-of-notice
        - with-simple-notice
      properties:
        completeness-checking:
          type: boolean
          description: Проверка комплектности
        contents-checking:
          type: boolean
          description: Проверка вложения
        courier:
          type: boolean
          description: Курьер
        declared-value:
          type: integer
          description: Объявленная ценность
          minimum: 0
        delivery-point-index:
          type: string
          description: Идентификатор пункта выдачи заказов
        dimension:
          $ref: '#/components/schemas/Dimension'
        dimension-type:
          type: string
          description: Типоразмер
          enum:
            - S
            - M
            - L
            - XL
        entries-type:
          type: string
          description: Категория вложения
          enum:
            - GIFT
            - DOCUMENT
            - SALE_OF_GOODS
            - COMMERCIAL_SAMPLE
            - OTHER
        fragile:
          type: boolean
          description: Осторожно/Хрупкое/Терморежим
        index-from:
          type: string
          description: Индекс ОПС места приёма
          pattern: '^[0-9]{6}$'
        index-to:
          type: string
          description: Индекс ОПС места назначения
          pattern: '^[0-9]{6}$'
        inventory:
          type: boolean
          description: Опись вложения
        mail-category:
          type: string
          description: Категория РПО
          enum:
            - SIMPLE
            - ORDERED
            - ORDINARY
            - WITH_DECLARED_VALUE
            - WITH_DECLARED_VALUE_AND_CASH_ON_DELIVERY
        mail-direct:
          type: integer
          description: Код страны назначения
          minimum: 0
        mail-type:
          type: string
          description: Вид РПО
          enum:
            - UNDEFINED
            - POSTAL_PARCEL
            - ONLINE_PARCEL
            - ONLINE_COURIER
            - LETTER
            - BANDEROL
            - BUSINESS_COURIER
            - BUSINESS_COURIER_ES
            - EMS
            - EMS_OPTIMAL
            - SMALL_PACKET
        mass:
          type: integer
          description: Масса (граммы)
          minimum: 0
        notice-payment-method:
          type: string
          description: Способ оплаты уведомления
          enum:
            - CASHLESS
            - STAMP
            - FRANKING
        payment-method:
          type: string
          description: Способ оплаты
          enum:
            - CASHLESS
            - STAMP
            - FRANKING
        sms-notice-recipient:
          type: integer
          description: SMS-уведомление получателю
          minimum: 0
        transport-type:
          type: string
          description: Вид транспортировки
          enum:
            - SURFACE
            - AVIA
            - COMBINED
            - EXPRESS
        vsd:
          type: boolean
          description: Возврат сопроводительных документов
        with-electronic-notice:
          type: boolean
          description: С электронным уведомлением
        with-order-of-notice:
          type: boolean
          description: С заказным уведомлением
        with-simple-notice:
          type: boolean
          description: С простым уведомлением

    TariffResponse:
      type: object
      description: Ответ с расчётом тарифа
      required:
        - inventory-rate
        - total-rate
        - total-vat
        - vsd-rate
      properties:
        avia-rate:
          $ref: '#/components/schemas/Rate'
        completeness-checking-rate:
          $ref: '#/components/schemas/Rate'
        contents-checking-rate:
          $ref: '#/components/schemas/Rate'
        delivery-time:
          $ref: '#/components/schemas/DeliveryTime'
        fragile-rate:
          $ref: '#/components/schemas/Rate'
        ground-rate:
          $ref: '#/components/schemas/Rate'
        insurance-rate:
          $ref: '#/components/schemas/Rate'
        inventory-rate:
          $ref: '#/components/schemas/Rate'
        notice-payment-method:
          type: string
          description: Способ оплаты уведомления
          enum:
            - CASHLESS
            - STAMP
            - FRANKING
        notice-rate:
          $ref: '#/components/schemas/Rate'
        oversize-rate:
          $ref: '#/components/schemas/Rate'
        payment-method:
          type: string
          description: Способ оплаты
          enum:
            - CASHLESS
            - STAMP
            - FRANKING
        sms-notice-recipient-rate:
          $ref: '#/components/schemas/Rate'
        total-rate:
          type: integer
          description: Итого (копейки)
          minimum: 0
        total-vat:
          type: integer
          description: Всего НДС (копейки)
          minimum: 0
        vsd-rate:
          $ref: '#/components/schemas/Rate'

    SettingsLimitResponse:
      type: object
      description: Лимиты запросов клиента
      required:
        - allowed-count
        - current-count
      additionalProperties: false
      properties:
        allowed-count:
          type: integer
          description: Разрешённое количество запросов
          minimum: 0
        current-count:
          type: integer
          description: Текущее количество запросов
          minimum: 0

    UserShippingPointItem:
      type: object
      description: Точка сдачи отправлений
      required:
        - operator-postcode
      additionalProperties: false
      properties:
        enabled:
          type: boolean
          description: Активна
        operator-postcode:
          type: string
          description: Индекс ОПС обслуживания
        ops-address:
          type: string
          description: Адрес ОПС

    UserShippingPointsResponse:
      type: array
      description: Точки сдачи пользователя
      items:
        $ref: '#/components/schemas/UserShippingPointItem'

  responses:
    BadRequest:
      description: Некорректный запрос
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ExternalErrorResponse'
    Unauthorized:
      description: Не авторизован
    Forbidden:
      description: Доступ запрещён
    NotFound:
      description: Ресурс не найден
    UnprocessableEntity:
      description: Ошибки валидации
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/LegacyErrorResponse'
    BinaryPdf:
      description: PDF-документ
      content:
        application/pdf:
          schema:
            type: string
            format: binary
    BinaryZip:
      description: ZIP-архив с документами
      content:
        application/zip:
          schema:
            type: string
            format: binary
    BinaryOctetStream:
      description: Бинарный файл
      content:
        application/octet-stream:
          schema:
            type: string
            format: binary

paths:

  /1.0/user/backlog:
    put:
      tags:
        - orders
      summary: Создать заказы (V1)
      description: Creates one or more orders in the backlog (draft state). Returns created order IDs and any errors.
      operationId: createOrders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreateRequest'
      responses:
        '200':
          description: Заказы созданы
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderCreateResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /2.0/user/backlog:
    put:
      tags:
        - orders
      summary: Создать заказы (V2)
      description: Creates one or more orders in the backlog using the V2 schema with extended response including barcodes and group info.
      operationId: createOrdersV2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreateRequest'
      responses:
        '200':
          description: Заказы созданы (V2)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderCreateV2Response'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /1.0/backlog:
    get:
      tags:
        - orders
      summary: Найти заказы в черновике
      description: Returns a list of orders currently in the backlog, optionally filtered by search query with pagination.
      operationId: searchOrders
      parameters:
        - name: query
          in: query
          description: Строка поиска
          schema:
            type: string
        - name: size
          in: query
          description: Количество записей на странице
          schema:
            type: integer
        - name: page
          in: query
          description: Номер страницы (начиная с 0)
          schema:
            type: integer
      responses:
        '200':
          description: Список заказов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderSearchResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /1.0/backlog/{id}:
    get:
      tags:
        - orders
      summary: Найти заказ по ID
      description: Returns a single order from the backlog by its internal identifier.
      operationId: getOrderById
      parameters:
        - name: id
          in: path
          required: true
          description: Идентификатор заказа
          schema:
            type: integer
      responses:
        '200':
          description: Заказ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderObject'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags:
        - orders
      summary: Редактировать заказ
      description: Updates an existing draft order by its ID with new recipient, mail, and service data.
      operationId: editOrder
      parameters:
        - name: id
          in: path
          required: true
          description: Идентификатор заказа
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderEditRequest'
      responses:
        '200':
          description: Заказ обновлён
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /1.0/backlog/delete:
    delete:
      tags:
        - orders
      summary: Удалить заказы из черновика
      description: Deletes one or more draft orders by their IDs.
      operationId: deleteOrders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderDeleteRequest'
      responses:
        '200':
          description: Результат удаления
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDeleteResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /1.0/backlog/backnew:
    post:
      tags:
        - orders
      summary: Вернуть заказы в черновик
      description: Moves orders back to the backlog (draft) state by their barcodes (ШПИ).
      operationId: returnOrdersToBacklog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderBackNewRequest'
      responses:
        '200':
          description: Результат возврата
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderBackNewResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /1.0/backlog/group/{group-name}:
    get:
      tags:
        - orders
      summary: Найти заказы черновика по группе
      description: Returns orders in the backlog belonging to a specific group name.
      operationId: searchOrdersByGroup
      parameters:
        - name: group-name
          in: path
          required: true
          description: Наименование группы
          schema:
            type: string
      responses:
        '200':
          description: Список заказов группы
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderSearchResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /1.0/user/shipment:
    put:
      tags:
        - batches
      summary: Создать партию из заказов
      description: Creates a new batch (shipment) from the given order IDs, moving them out of the backlog.
      operationId: createShipment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateShipmentRequest'
      responses:
        '200':
          description: Партия создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateShipmentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /1.0/batch:
    get:
      tags:
        - batches
      summary: Получить все партии
      description: Returns all batches (shipments) for the current user with pagination support.
      operationId: getAllBatches
      parameters:
        - name: size
          in: query
          description: Количество записей на странице
          schema:
            type: integer
        - name: page
          in: query
          description: Номер страницы
          schema:
            type: integer
      responses:
        '200':
          description: Список партий
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAllBatchesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /1.0/batch/{name}:
    get:
      tags:
        - batches
      summary: Найти партию по наименованию
      description: Returns details of a specific batch by its name.
      operationId: getBatchByName
      parameters:
        - name: name
          in: path
          required: true
          description: Наименование партии
          schema:
            type: string
      responses:
        '200':
          description: Партия
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchObject'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /1.0/batch/{name}/shipment:
    post:
      tags:
        - batches
      summary: Перенести заказы в партию
      description: Transfers orders (by IDs) from the backlog or another batch into an existing named batch.
      operationId: transferOrdersToBatch
      parameters:
        - name: name
          in: path
          required: true
          description: Наименование партии
          schema:
            type: string
        - name: group-name
          in: query
          description: Наименование группы (для перемещения из другой партии)
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchShipmentRequest'
      responses:
        '200':
          description: Результат переноса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchShipmentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags:
        - batches
      summary: Добавить отправления в партию
      description: Adds new shipments directly into an existing batch using order data objects.
      operationId: addShipmentsToBatch
      parameters:
        - name: name
          in: path
          required: true
          description: Наименование партии
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShipmentAddRequest'
      responses:
        '200':
          description: Результат добавления
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShipmentAddResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /1.0/batch/{name}/shipment/delete:
    delete:
      tags:
        - batches
      summary: Удалить заказы из партии
      description: Removes orders from a batch by their IDs, returning them to the backlog.
