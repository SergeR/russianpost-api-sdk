      description: Updates an existing return shipment identified by its barcode with new address or contact information.
      operationId: editReturn
      parameters:
        - name: barcode
          in: path
          required: true
          description: ШПИ возвратного отправления
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReturnsPostRequest'
      responses:
        '200':
          description: Результат редактирования
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReturnsPostResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

