openapi: 3.1.0
info:
  title: Почта России — Отправка API
  description: |
    REST API Почты России для управления отправлениями, партиями, документами,
    архивом, почтовыми отделениями, временными слотами, возвратами и утилитами.
  version: '1.0'
  contact:
    name: Почта России
    url: https://otpravka.pochta.ru

servers:
  - url: https://otpravka-api.pochta.ru
    description: Production

security:
  - AccessToken: []
    UserAuthorization: []

tags:
  - name: orders
    description: Управление заказами (заказы в черновике)
  - name: batches
    description: Управление партиями (отправками)
  - name: documents
    description: Генерация документов и печатных форм
  - name: archive
    description: Архив партий
  - name: post-offices
    description: Поиск почтовых отделений
  - name: time-slots
    description: Управление временными слотами доставки
  - name: returns
    description: Управление возвратными отправлениями
  - name: utility
    description: Утилиты — нормализация данных, тарифы, настройки

components:
  securitySchemes:
    AccessToken:
      type: apiKey
      in: header
      name: Authorization
      description: Токен доступа. Формат — "AccessToken <token>"
    UserAuthorization:
      type: apiKey
      in: header
      name: X-User-Authorization
      description: Авторизация пользователя. Формат — "Basic <base64(login:password)>"

  schemas:

    LegacyError:
      type: object
      description: Объект ошибки в старом формате
      properties:
        error-code:
          type: string
          description: Код ошибки
        error-details:
          type: string
          description: Подробности ошибки
        position:
          type: integer
          description: Позиция в исходном массиве

    LegacyErrorResponse:
      type: array
      description: Список ошибок в старом формате
      items:
        $ref: '#/components/schemas/LegacyError'

    ExternalErrorResponse:
      type: object
      description: Ошибка во внешнем формате (timeslots, returns)
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Текстовый идентификатор ошибки
        message:
          type: string
          description: Подробное описание ошибки
        errors:
          type: array
          description: Ошибки по отдельным полям
          items:
            type: object
            required:
              - field
              - message
            properties:
              field:
                type: string
                description: Идентификатор поля
              message:
                type: string
                description: Описание ошибки поля

    Dimension:
      type: object
      description: Линейные размеры (сантиметры)
      properties:
        height:
          type: integer
          description: Высота (см)
          minimum: 0
        length:
          type: integer
          description: Длина (см)
          minimum: 0
        width:
          type: integer
          description: Ширина (см)
          minimum: 0

    Address:
      type: object
      description: Адрес
      required:
        - address-type
        - index
        - place
        - region
      properties:
        address-type:
          type: string
          description: Тип адреса
          enum:
            - DEFAULT
        area:
          type: string
          description: Район
        building:
          type: string
          description: Часть здания — строение
        corpus:
          type: string
          description: Часть здания — корпус
        hotel:
          type: string
          description: Название гостиницы
        house:
          type: string
          description: Номер здания
        index:
          type: string
          description: Почтовый индекс
          pattern: '^[0-9]{6}$'
        letter:
          type: string
          description: Часть здания — литера
        location:
          type: string
          description: Микрорайон
        manual-address-input:
          type: boolean
          description: Признак ручного ввода адреса
        num-address-type:
          type: string
          description: Номер для а/я, войсковая часть, полевая почта
        office:
          type: string
          description: Часть здания — офис
        place:
          type: string
          description: Населённый пункт
        region:
          type: string
          description: Область, регион
        room:
          type: string
          description: Часть здания — номер помещения
        slash:
          type: string
          description: Часть здания — дробь
        street:
          type: string
          description: Улица
        vladenie:
          type: string
          description: Часть адреса — владение

    CustomsEntry:
      type: object
      description: Позиция таможенной декларации
      properties:
        country-code:
          type: integer
          description: Код страны
        description:
          type: string
          description: Описание товара
        quantity:
          type: integer
          description: Количество
        value:
          type: integer
          description: Стоимость (копейки)
        weight:
          type: integer
          description: Вес (граммы)
          minimum: 0

    CustomsDeclaration:
      type: object
      description: Таможенная декларация
      properties:
        entries:
          type: array
          description: Позиции декларации
          items:
            $ref: '#/components/schemas/CustomsEntry'
        currency:
          type: string
          description: Валюта

    Rate:
      type: object
      description: Тариф с НДС
      required:
        - rate
      properties:
        rate:
          type: integer
          description: Тариф без НДС (копейки)
          minimum: 0
        vat:
          type: integer
          description: НДС (копейки)
          minimum: 0

    DeliveryTime:
      type: object
      description: Время доставки
      properties:
        max-days:
          type: integer
          description: Максимальное время доставки (дни)
          minimum: 0
        min-days:
          type: integer
          description: Минимальное время доставки (дни)
          minimum: 0

    OrderCreateItem:
      type: object
      description: Заказ для создания
      required:
        - address-type-to
        - fragile
        - given-name
        - house-to
        - mail-category
        - mail-direct
        - mail-type
        - mass
        - order-num
        - place-to
        - recipient-name
        - region-to
        - surname
        - tariff-count
      properties:
        address-type-to:
          type: string
          description: Тип адреса получателя
          enum:
            - DEFAULT
            - PO_BOX
            - UNIT
            - UNIT_SOUTH
            - FIELD_POST
        area-to:
          type: string
          description: Район получателя
        building-to:
          type: string
          description: Строение получателя
        completeness-checking:
          type: boolean
          description: Услуга проверки комплектности
        contents-checking:
          type: boolean
          description: Услуга проверки вложения
        corpus-to:
          type: string
          description: Корпус получателя
        courier:
          type: boolean
          description: Курьерская доставка
        customs-declaration:
          $ref: '#/components/schemas/CustomsDeclaration'
        declared-value:
          type: integer
          description: Объявленная ценность (копейки)
          minimum: 0
        delivery-point-index:
          type: string
          description: Индекс пункта выдачи заказов
        dimension:
          $ref: '#/components/schemas/Dimension'
        dimension-type:
          type: string
          description: Типоразмер
          enum:
            - S
            - M
            - L
            - XL
        entries-type:
          type: string
          description: Категория вложения
          enum:
            - GIFT
            - DOCUMENT
            - SALE_OF_GOODS
            - COMMERCIAL_SAMPLE
            - OTHER
        envelope-type:
          type: string
          description: Тип конверта
          enum:
            - C4
            - C5
            - C6
            - DL
        fragile:
          type: boolean
          description: Осторожно/Хрупкое/Терморежим
        given-name:
          type: string
          description: Имя получателя
        hotel-to:
          type: string
          description: Гостиница получателя
        house-to:
          type: string
          description: Номер дома получателя
        index-to:
          type: string
          description: Почтовый индекс получателя
          pattern: '^[0-9]{6}$'
        insr-value:
          type: integer
          description: Объявленная ценность страхования (копейки)
          minimum: 0
        inventory:
          type: boolean
          description: Опись вложения
        letter-to:
          type: string
          description: Литера адреса получателя
        location-to:
          type: string
          description: Микрорайон получателя
        mail-category:
          type: string
          description: Категория РПО
          enum:
            - SIMPLE
            - ORDERED
            - ORDINARY
            - WITH_DECLARED_VALUE
            - WITH_DECLARED_VALUE_AND_CASH_ON_DELIVERY
        mail-direct:
          type: integer
          description: Код страны назначения
          minimum: 0
        mail-type:
          type: string
          description: Вид РПО
          enum:
            - UNDEFINED
            - POSTAL_PARCEL
            - ONLINE_PARCEL
            - ONLINE_COURIER
            - LETTER
            - BANDEROL
            - BUSINESS_COURIER
            - BUSINESS_COURIER_ES
            - EMS
            - EMS_OPTIMAL
            - SMALL_PACKET
        mass:
          type: integer
          description: Масса отправления (граммы)
          minimum: 0
        middle-name:
          type: string
          description: Отчество получателя
        notice-payment-method:
          type: string
          description: Способ оплаты уведомления
          enum:
            - CASHLESS
            - STAMP
            - FRANKING
        num-address-type-to:
          type: string
          description: Номер для а/я, войсковая часть
        office-to:
          type: string
          description: Офис получателя
        order-num:
          type: string
          description: Номер заказа (внешний идентификатор)
        payment-method:
          type: string
          description: Способ оплаты
          enum:
            - CASHLESS
            - STAMP
            - FRANKING
        place-to:
          type: string
          description: Населённый пункт получателя
        postoffice-code:
          type: string
          description: Индекс ОПС
        recipient-name:
          type: string
          description: Наименование получателя
        region-to:
          type: string
          description: Область/регион получателя
        room-to:
          type: string
          description: Номер помещения получателя
        slash-to:
          type: string
          description: Дробь адреса получателя
        sms-notice-recipient:
          type: integer
          description: Признак SMS-уведомления получателя
          minimum: 0
        street-to:
          type: string
          description: Улица получателя
        surname:
          type: string
          description: Фамилия получателя
        tariff-count:
          type: integer
          description: Количество по тарифу
          minimum: 0
        transport-type:
          type: string
          description: Вид транспортировки
          enum:
            - SURFACE
            - AVIA
            - COMBINED
            - EXPRESS
        vsd:
          type: boolean
          description: Возврат сопроводительных документов
        with-electronic-notice:
          type: boolean
          description: С электронным уведомлением
        with-order-of-notice:
          type: boolean
          description: С заказным уведомлением
        with-simple-notice:
          type: boolean
          description: С простым уведомлением

    OrderCreateRequest:
      type: array
      description: Массив заказов для создания
      minItems: 1
      items:
        $ref: '#/components/schemas/OrderCreateItem'

    OrderCreateResponse:
      type: object
      description: Результат создания заказов
      properties:
        errors:
          type: array
          description: Ошибки создания
          items:
            $ref: '#/components/schemas/LegacyError'
        result-ids:
          type: array
          description: Идентификаторы созданных заказов
          items:
            type: integer

    OrderCreateV2Response:
      type: object
      description: Результат создания заказов (V2)
      properties:
        errors:
          type: array
          description: Ошибки создания
          items:
            $ref: '#/components/schemas/LegacyError'
        result-ids:
          type: array
          description: Идентификаторы созданных заказов
          items:
            type: integer
        orders:
          type: array
          description: Созданные заказы с деталями
          items:
            type: object
            properties:
              barcode:
                type: string
                description: ШПИ
              order-num:
                type: string
                description: Номер заказа
              result-id:
                type: integer
                description: Идентификатор заказа
              group-name:
                type: string
                description: Наименование группы

    OrderEditRequest:
      type: object
      description: Данные для редактирования заказа
      required:
        - address-type-to
        - given-name
        - house-to
        - mail-category
        - mail-type
        - mass
        - order-num
        - place-to
        - postoffice-code
        - recipient-name
        - region-to
        - street-to
        - surname
      properties:
        address-type-to:
          type: string
          description: Тип адреса получателя
          enum:
            - DEFAULT
            - PO_BOX
            - UNIT
            - UNIT_SOUTH
            - FIELD_POST
        area-to:
          type: string
          description: Район получателя
        building-to:
          type: string
          description: Строение получателя
        completeness-checking:
          type: boolean
          description: Услуга проверки комплектности
        contents-checking:
          type: boolean
          description: Услуга проверки вложения
        corpus-to:
          type: string
          description: Корпус получателя
        courier:
          type: boolean
          description: Курьерская доставка
        customs-declaration:
          $ref: '#/components/schemas/CustomsDeclaration'
        declared-value:
          type: integer
          description: Объявленная ценность (копейки)
          minimum: 0
        delivery-point-index:
          type: string
          description: Индекс пункта выдачи
        dimension:
          $ref: '#/components/schemas/Dimension'
        dimension-type:
          type: string
          description: Типоразмер
          enum:
            - S
            - M
            - L
            - XL
        entries-type:
          type: string
          description: Категория вложения
          enum:
            - GIFT
            - DOCUMENT
            - SALE_OF_GOODS
            - COMMERCIAL_SAMPLE
            - OTHER
        fragile:
          type: boolean
          description: Осторожно/Хрупкое/Терморежим
        given-name:
          type: string
          description: Имя получателя
        hotel-to:
          type: string
          description: Гостиница
        house-to:
          type: string
          description: Номер дома
        index-to:
          type: string
          description: Почтовый индекс получателя
          pattern: '^[0-9]{6}$'
        insr-value:
          type: integer
          description: Страховая ценность (копейки)
          minimum: 0
        inventory:
          type: boolean
          description: Опись вложения
        letter-to:
          type: string
          description: Литера
        location-to:
          type: string
          description: Микрорайон
        mail-category:
          type: string
          description: Категория РПО
          enum:
            - SIMPLE
            - ORDERED
            - ORDINARY
            - WITH_DECLARED_VALUE
            - WITH_DECLARED_VALUE_AND_CASH_ON_DELIVERY
        mail-direct:
          type: integer
          description: Код страны назначения
          minimum: 0
        mail-type:
          type: string
          description: Вид РПО
          enum:
            - UNDEFINED
            - POSTAL_PARCEL
            - ONLINE_PARCEL
            - ONLINE_COURIER
            - LETTER
            - BANDEROL
            - BUSINESS_COURIER
            - BUSINESS_COURIER_ES
            - EMS
            - EMS_OPTIMAL
            - SMALL_PACKET
        mass:
          type: integer
          description: Масса (граммы)
          minimum: 0
        middle-name:
          type: string
          description: Отчество получателя
        notice-payment-method:
          type: string
          description: Способ оплаты уведомления
          enum:
            - CASHLESS
            - STAMP
            - FRANKING
        num-address-type-to:
          type: string
          description: Номер а/я или войсковой части
        office-to:
          type: string
          description: Офис
        order-num:
          type: string
          description: Номер заказа
        payment-method:
          type: string
          description: Способ оплаты
          enum:
            - CASHLESS
            - STAMP
            - FRANKING
        place-to:
          type: string
          description: Населённый пункт получателя
        postoffice-code:
          type: string
          description: Индекс ОПС
        recipient-name:
          type: string
          description: Наименование получателя
        region-to:
          type: string
          description: Область/регион получателя
        room-to:
          type: string
          description: Номер помещения
        slash-to:
          type: string
          description: Дробь
        sms-notice-recipient:
          type: integer
          description: SMS-уведомление получателю
          minimum: 0
        street-to:
          type: string
          description: Улица получателя
        surname:
          type: string
          description: Фамилия получателя
        transport-type:
          type: string
          description: Вид транспортировки
          enum:
            - SURFACE
            - AVIA
            - COMBINED
            - EXPRESS
        vsd:
          type: boolean
          description: Возврат сопроводительных документов
        with-electronic-notice:
          type: boolean
          description: С электронным уведомлением
        with-order-of-notice:
          type: boolean
          description: С заказным уведомлением
        with-simple-notice:
          type: boolean
          description: С простым уведомлением

    OrderDeleteRequest:
      type: array
      description: Список ID заказов для удаления
      minItems: 1
      items:
        type: integer

    OrderDeleteResponse:
      type: object
      description: Результат удаления заказов
      properties:
        errors:
          type: array
          description: Ошибки удаления
          items:
            $ref: '#/components/schemas/LegacyError'
        result-ids:
          type: array
          description: ID удалённых заказов
          items:
            type: integer

    OrderBackNewRequest:
      type: array
      description: Список ШПИ заказов для возврата в черновик
      minItems: 1
      items:
        type: string

    OrderBackNewResponse:
      type: object
      description: Результат возврата заказов в черновик
      properties:
        errors:
          type: array
          description: Ошибки
          items:
            $ref: '#/components/schemas/LegacyError'
        result-ids:
          type: array
          description: ID заказов, возвращённых в черновик
          items:
            type: integer

    OrderObject:
      type: object
      description: Заказ (полный объект)
      properties:
        address-type-from:
          type: string
          description: Тип адреса отправителя
          enum:
            - DEFAULT
            - PO_BOX
            - UNIT
            - UNIT_SOUTH
            - FIELD_POST
        address-type-to:
          type: string
          description: Тип адреса получателя
          enum:
            - DEFAULT
            - PO_BOX
            - UNIT
            - UNIT_SOUTH
            - FIELD_POST
        area-to:
          type: string
          description: Район получателя
        avia-rate:
          type: integer
          description: Плата за авиа-пересылку (копейки)
          minimum: 0
        avia-rate-with-vat:
          type: integer
          description: Плата за авиа-пересылку с НДС (копейки)
          minimum: 0
        avia-rate-wo-vat:
          type: integer
          description: Плата за авиа-пересылку без НДС (копейки)
          minimum: 0
        barcode:
          type: string
          description: ШПИ
        batch-name:
          type: string
          description: Наименование партии
        batch-status:
          type: string
          description: Статус партии
        building-to:
          type: string
          description: Строение получателя
        completeness-checking:
          type: boolean
          description: Проверка комплектности
        contents-checking:
          type: boolean
          description: Проверка вложения
        corpus-to:
          type: string
          description: Корпус получателя
        courier:
          type: boolean
          description: Курьерская доставка
        customs-declaration:
          $ref: '#/components/schemas/CustomsDeclaration'
        declared-value:
          type: integer
          description: Объявленная ценность (копейки)
          minimum: 0
        delivery-point-index:
          type: string
          description: Индекс пункта выдачи
        delivery-time:
          $ref: '#/components/schemas/DeliveryTime'
        dimension:
          $ref: '#/components/schemas/Dimension'
        dimension-type:
          type: string
          description: Типоразмер
          enum:
            - S
            - M
            - L
            - XL
        entries-type:
          type: string
          description: Категория вложения
        fragile:
          type: boolean
          description: Осторожно/Хрупкое/Терморежим
        given-name:
          type: string
          description: Имя получателя
        ground-rate:
          type: integer
          description: Плата за пересылку (копейки)
          minimum: 0
        ground-rate-with-vat:
          type: integer
          description: Плата за пересылку с НДС (копейки)
          minimum: 0
        ground-rate-wo-vat:
          type: integer
          description: Плата за пересылку без НДС (копейки)
          minimum: 0
        house-to:
          type: string
          description: Номер дома получателя
        id:
          type: integer
          description: Идентификатор заказа
        index-to:
          type: string
          description: Почтовый индекс получателя
        insr-rate:
          type: integer
          description: Плата за объявленную ценность (копейки)
          minimum: 0
        insr-rate-with-vat:
          type: integer
          description: Плата за объявленную ценность с НДС (копейки)
          minimum: 0
        insr-rate-wo-vat:
          type: integer
          description: Плата за объявленную ценность без НДС (копейки)
          minimum: 0
        insr-value:
          type: integer
          description: Страховая ценность (копейки)
          minimum: 0
        inventory:
          type: boolean
          description: Опись вложения
        inventory-rate:
          type: integer
          description: Плата за опись вложения (копейки)
          minimum: 0
