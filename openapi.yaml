  /1.0/tariff:
    get:
      tags:
        - utility
      summary: Рассчитать тариф
      description: Calculates the delivery tariff for given shipment parameters including mass, dimensions, mail type, and service flags.
      operationId: calculateTariff
      parameters:
        - name: completeness-checking
          in: query
          description: Проверка комплектности
          schema:
            type: boolean
        - name: contents-checking
          in: query
          description: Проверка вложения
          schema:
            type: boolean
        - name: courier
          in: query
          description: Курьер
          schema:
            type: boolean
        - name: declared-value
          in: query
          description: Объявленная ценность
          schema:
            type: integer
        - name: delivery-point-index
          in: query
          description: Индекс пункта выдачи
          schema:
            type: string
        - name: dimension-type
          in: query
          description: Типоразмер
          schema:
            type: string
            enum:
              - S
              - M
              - L
              - XL
        - name: entries-type
          in: query
          required: true
          description: Категория вложения
          schema:
            type: string
            enum:
              - GIFT
              - DOCUMENT
              - SALE_OF_GOODS
              - COMMERCIAL_SAMPLE
              - OTHER
        - name: fragile
          in: query
          description: Осторожно/Хрупкое/Терморежим
          schema:
            type: boolean
        - name: index-from
          in: query
          description: Индекс ОПС места приёма
          schema:
            type: string
            pattern: '^[0-9]{6}$'
        - name: index-to
          in: query
          description: Индекс ОПС назначения
          schema:
            type: string
            pattern: '^[0-9]{6}$'
        - name: inventory
          in: query
          required: true
          description: Опись вложения
          schema:
            type: boolean
        - name: mail-category
          in: query
          required: true
          description: Категория РПО
          schema:
            type: string
            enum:
              - SIMPLE
              - ORDERED
              - ORDINARY
              - WITH_DECLARED_VALUE
              - WITH_DECLARED_VALUE_AND_CASH_ON_DELIVERY
        - name: mail-direct
          in: query
          description: Код страны назначения
          schema:
            type: integer
        - name: mail-type
          in: query
          required: true
          description: Вид РПО
          schema:
            type: string
            enum:
              - UNDEFINED
              - POSTAL_PARCEL
              - ONLINE_PARCEL
              - ONLINE_COURIER
              - LETTER
              - BANDEROL
              - BUSINESS_COURIER
              - BUSINESS_COURIER_ES
              - EMS
              - EMS_OPTIMAL
              - SMALL_PACKET
        - name: mass
          in: query
          required: true
          description: Масса отправления (граммы)
          schema:
            type: integer
            minimum: 0
        - name: notice-payment-method
          in: query
          description: Способ оплаты уведомления
          schema:
            type: string
            enum:
              - CASHLESS
              - STAMP
              - FRANKING
        - name: payment-method
          in: query
          description: Способ оплаты
          schema:
            type: string
            enum:
              - CASHLESS
              - STAMP
              - FRANKING
        - name: sms-notice-recipient
          in: query
          description: SMS-уведомление получателю
          schema:
            type: integer
        - name: transport-type
          in: query
          description: Вид транспортировки
          schema:
            type: string
            enum:
              - SURFACE
              - AVIA
              - COMBINED
              - EXPRESS
        - name: vsd
          in: query
          description: Возврат сопроводительных документов
          schema:
            type: boolean
        - name: with-electronic-notice
          in: query
          description: С электронным уведомлением
          schema:
            type: boolean
        - name: with-order-of-notice
          in: query
          required: true
          description: С заказным уведомлением
          schema:
            type: boolean
        - name: with-simple-notice
          in: query
          required: true
          description: С простым уведомлением
          schema:
            type: boolean
      responses:
        '200':
          description: Расчёт тарифа
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TariffResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

